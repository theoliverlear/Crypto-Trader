name: Build & Publish Crypto-Trader-Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-on-aws:
    runs-on: ubuntu-latest
    outputs:
      site_ready: ${{ steps.download.outputs.site_ready }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DOCS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Trigger CodeBuild and wait
        id: codebuild
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: ct-docs-build
          buildspec-override: .aws/buildspec-docs.yml
          env-vars-for-codebuild: |
            GITHUB_SHA,
            GITHUB_REF_NAME

      - name: Download site artifact from S3
        id: download
        run: |
          aws s3 cp s3://ct-docs-build-artifacts/${{ github.sha }}/site.tar.gz site.tar.gz
          mkdir -p site
          tar xzf site.tar.gz -C site
          if [ -s "site/index.html" ] && [ "$(find site -type f | wc -l)" -gt 5 ]; then
            echo "site_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "site_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        if: steps.download.outputs.site_ready == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-on-aws
    if: needs.build-on-aws.result == 'success' && needs.build-on-aws.outputs.site_ready == 'true'
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
