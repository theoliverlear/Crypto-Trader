name: Sync main back to development

on:
    pull_request:
        branches:
            - main
        types:
            - closed

jobs:
    sync-main-to-development:
        if: >
            github.event.pull_request.merged == true &&
            github.event.pull_request.head.ref == 'development'
        runs-on: ubuntu-latest

        permissions:
            contents: write
            pull-requests: write

        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Create sync PR if main is ahead of development
              id: sync_pr
              shell: bash
              run: |
                  set -euo pipefail

                  AHEAD_BY="$(gh api \
                    "repos/${GITHUB_REPOSITORY}/compare/development...main" \
                    --jq '.ahead_by')"

                  if [ "$AHEAD_BY" = "0" ]; then
                    echo "main has no commits to sync into development."
                    echo "number=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  EXISTING_PR_NUMBER="$(gh pr list \
                    --base development \
                    --head main \
                    --state open \
                    --json number \
                    --jq '.[0].number // empty')"

                  if [ -n "$EXISTING_PR_NUMBER" ]; then
                    echo "Sync PR already exists: #$EXISTING_PR_NUMBER"
                    echo "number=$EXISTING_PR_NUMBER" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  NEW_PR_URL="$(gh pr create \
                    --base development \
                    --head main \
                    --title "Sync main back to development" \
                    --body "Automated PR to sync main into development after development was merged into main." \
                    --no-maintainer-edit)"

                  NEW_PR_NUMBER="$(gh pr view "$NEW_PR_URL" --json number --jq '.number')"

                  echo "Created sync PR: #$NEW_PR_NUMBER"
                  echo "number=$NEW_PR_NUMBER" >> "$GITHUB_OUTPUT"

            - name: Merge sync PR
              if: steps.sync_pr.outputs.number != ''
              shell: bash
              run: |
                  gh pr merge "${{ steps.sync_pr.outputs.number }}" --merge