version: 0.2

env:
  secrets-manager:
    PSQL_DB_URL: ct-docs-secrets:PSQL_DB_URL
    PSQL_HOST: ct-docs-secrets:PSQL_HOST
    PSQL_PW: ct-docs-secrets:PSQL_PW
    PSQL_USER: ct-docs-secrets:PSQL_USER
    DJANGO_SECRET_KEY: ct-docs-secrets:DJANGO_SECRET_KEY
    OPENAI_KEY: ct-docs-secrets:OPENAI_KEY
    WORLDNEWS_API_KEY: ct-docs-secrets:WORLDNEWS_API_KEY
    X_ACCESS_SECRET: ct-docs-secrets:X_ACCESS_SECRET
    X_ACCESS_TOKEN: ct-docs-secrets:X_ACCESS_TOKEN
    X_API_KEY: ct-docs-secrets:X_API_KEY
    X_SECRET: ct-docs-secrets:X_SECRET
    JWT_SECRET: ct-docs-secrets:JWT_SECRET
    SECURITY_HONEYPOT_PATHS: ct-docs-secrets:SECURITY_HONEYPOT_PATHS
    REPO_NAME: ct-docs-secrets:REPO_NAME
    APP_NAME: ct-docs-secrets:APP_NAME
  variables:
    MAVEN_OPTS: "-Xms1g -Xmx6g -XX:MetaspaceSize=1g -XX:MaxMetaspaceSize=4g -XX:+UseG1GC"
    OPENAPI_MIN_BYTES: "512"
    REQUIRED_SERVICES: "api data contact"
    OPTIONAL_SERVICES: "engine"
    ALLOW_PARTIAL_DOCS: "false"

phases:
  install:
    runtime-versions:
      java: corretto23
      python: 3.10
      dotnet: 8.0
    commands:
      - java -version
      - mvn --version
      - python3 --version
      - pip3 install mkdocs mkdocs-material
      - dotnet tool install --global dotnet-reportgenerator-globaltool || true
      - export PATH="$PATH:$HOME/.dotnet/tools"

  pre_build:
    commands:
      # Start Kafka
      - docker compose -f infra/kafka/docker-compose.yml up -d
      - |
        for i in $(seq 1 60); do
          if timeout 1 bash -c 'cat </dev/null >/dev/tcp/127.0.0.1/9092' 2>/dev/null; then
            echo "Kafka is up"; break
          fi
          echo "Waiting for Kafka... ($i/60)"; sleep 2
        done
        if ! timeout 1 bash -c 'cat </dev/null >/dev/tcp/127.0.0.1/9092' 2>/dev/null; then
          echo "Kafka failed to start on port 9092"
          docker compose -f infra/kafka/docker-compose.yml logs || true
          exit 1
        fi

  build:
    commands:
      # 1. Build all modules with Dokka (parallel, capped at 4 threads to avoid metaspace OOM)
      - mvn -B -T 4 -DskipTests -am -U -P release install org.jetbrains.dokka:dokka-maven-plugin:1.9.20:dokka

      # 2. Start services for OpenAPI generation (from pre-built JARs)
      - |
        API_JAR=$(find Crypto-Trader-Api/target -maxdepth 1 -name '*.jar' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)
        DATA_JAR=$(find Crypto-Trader-Data/target -maxdepth 1 -name '*.jar' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)
        ENGINE_JAR=$(find Crypto-Trader-Engine/target -maxdepth 1 -name '*.jar' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)
        CONTACT_JAR=$(find Crypto-Trader-Contact/target -maxdepth 1 -name '*.jar' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)

        nohup java $MAVEN_OPTS -jar "$API_JAR" \
          --spring.profiles.active=docs \
          --server.port=18080 > api.log 2>&1 &
        echo $! > api.pid

        nohup java $MAVEN_OPTS -Dcryptotrader.load.currency=false -jar "$DATA_JAR" \
          --spring.profiles.active=docs \
          --server.port=18081 > data.log 2>&1 &
        echo $! > data.pid

        nohup java $MAVEN_OPTS -jar "$ENGINE_JAR" \
          --spring.profiles.active=docs \
          --server.port=18082 \
          --cryptotrader.engine.trading.enabled=false > engine.log 2>&1 &
        echo $! > engine.pid

        nohup java $MAVEN_OPTS -jar "$CONTACT_JAR" \
          --spring.profiles.active=docs \
          --server.port=18083 \
          --cryptotrader.engine.trading.enabled=false > contact.log 2>&1 &
        echo $! > contact.pid

      # 3. Wait for services
      - |
        probe() {
          local port="$1"
          local min=${OPENAPI_MIN_BYTES:-512}
          local tmp=".probe_${port}.out"
          rm -f "$tmp"
          if curl -fsS "http://localhost:${port}/v3/api-docs.yaml" -o "$tmp"; then
            local sz
            sz=$(wc -c < "$tmp" 2>/dev/null || echo 0)
            case "$sz" in ''|*[!0-9]*) sz=0 ;; esac
            if [ "$sz" -gt "$min" ]; then rm -f "$tmp"; echo ok; return; fi
            rm -f "$tmp"
            if curl -fsS "http://localhost:${port}/v3/api-docs" -o "$tmp"; then
              sz=$(wc -c < "$tmp" 2>/dev/null || echo 0)
              case "$sz" in ''|*[!0-9]*) sz=0 ;; esac
              rm -f "$tmp"
              if [ "$sz" -gt "$min" ]; then echo ok; else echo no; fi
            else
              rm -f "$tmp" 2>/dev/null || true
              echo no
            fi
          else
            if curl -fsS "http://localhost:${port}/v3/api-docs" -o "$tmp"; then
              local sz
              sz=$(wc -c < "$tmp" 2>/dev/null || echo 0)
              case "$sz" in ''|*[!0-9]*) sz=0 ;; esac
              rm -f "$tmp"
              if [ "$sz" -gt "$min" ]; then echo ok; else echo no; fi
            else
              rm -f "$tmp" 2>/dev/null || true
              echo no
            fi
          fi
        }

        is_required() {
          local name="$1"
          for req in ${REQUIRED_SERVICES:-api}; do
            if [ "$req" = "$name" ]; then return 0; fi
          done
          return 1
        }

        for i in $(seq 1 240); do
          # Fail fast if a required service died
          for pidfile in *.pid; do
            [ -f "$pidfile" ] || continue
            pid=$(cat "$pidfile")
            if ! ps -p "$pid" >/dev/null 2>&1; then
              svc="${pidfile%.pid}"
              if is_required "$svc"; then
                echo "Required service '$svc' exited before becoming ready."
                tail -n 200 *.log || true
                exit 1
              else
                echo "WARNING: Optional service '$svc' exited before readiness; continuing."
              fi
            fi
          done

          A=$(probe 18080)
          D=$(probe 18081)
          E=$(probe 18082)
          C=$(probe 18083)
          echo "probe #$i  A=$A D=$D E=$E C=$C"

          all_required_ready=true
          for req in ${REQUIRED_SERVICES:-api}; do
            case "$req" in
              api)     [ "$A" = ok ] || all_required_ready=false ;;
              data)    [ "$D" = ok ] || all_required_ready=false ;;
              engine)  [ "$E" = ok ] || all_required_ready=false ;;
              contact) [ "$C" = ok ] || all_required_ready=false ;;
            esac
          done

          if $all_required_ready; then
            echo "All required services are ready: ${REQUIRED_SERVICES}"
            break
          fi
          sleep 2
        done

        if ! $all_required_ready; then
          if [ "${ALLOW_PARTIAL_DOCS}" = "true" ]; then
            echo "WARNING: Timed out waiting for all required services; proceeding due to ALLOW_PARTIAL_DOCS=true"
          else
            echo "Timed out waiting for required services to start: ${REQUIRED_SERVICES}"
            tail -n 200 *.log || true
            exit 1
          fi
        fi

      # 4. Generate OpenAPI specs via Docs module
      - mvn -B -DskipTests -Ddocs.skipOpenapi=false -f Crypto-Trader-Docs/pom.xml -N verify

      # 5. Ensure OpenAPI specs exist (fallback fetch from live services)
      - |
        BASE="Crypto-Trader-Docs/docs/api"
        mkdir -p "$BASE"

        fetch_if_missing() {
          local name="$1" port="$2"
          local file="$BASE/openapi-${name}.yaml"
          local tmp="$file.tmp"
          if [ -s "$file" ]; then
            echo "Found existing spec for $name at $file"; return 0
          fi
          echo "Spec for $name missing; attempting to pull from :$port..."
          if curl -fsS "http://localhost:${port}/v3/api-docs.yaml" -o "$tmp" && [ -s "$tmp" ]; then
            mv -f "$tmp" "$file"; echo "Saved $file (yaml)"; return 0
          fi
          rm -f "$tmp"
          if curl -fsS "http://localhost:${port}/v3/api-docs" -o "$tmp" && [ -s "$tmp" ]; then
            mv -f "$tmp" "$file"; echo "Saved $file (json)"; return 0
          fi
          rm -f "$tmp"
          echo "ERROR: Could not fetch spec for $name"; return 1
        }

        generate_stub() {
          local name="$1" title="$2" description="$3"
          local file="$BASE/openapi-${name}.yaml"
          printf '%s\n' \
            "openapi: 3.0.3" \
            "info:" \
            "  title: ${title}" \
            "  version: 0.0.0" \
            "  description: ${description}" \
            "servers: []" \
            "paths: {}" \
            "components: {}" \
            > "$file"
          echo "WARNING: Generated stub spec for ${name}"
        }

        status=0
        fetch_if_missing api 18080     || status=1
        fetch_if_missing data 18081    || status=1
        fetch_if_missing engine 18082  || status=1
        fetch_if_missing contact 18083 || status=1

        min=${OPENAPI_MIN_BYTES:-512}
        for s in ${REQUIRED_SERVICES:-api}; do
          f="$BASE/openapi-$s.yaml"
          sz=$(wc -c < "$f" 2>/dev/null || echo 0)
          case "$sz" in ''|*[!0-9]*) sz=0 ;; esac
          if [ "$sz" -lt "$min" ]; then
            if [ "${ALLOW_PARTIAL_DOCS}" = "true" ]; then
              echo "WARNING: Required spec too small ($sz bytes < $min): $f"
            else
              echo "ERROR: Required spec too small ($sz bytes < $min): $f"; status=1
            fi
          fi
        done

        for s in ${OPTIONAL_SERVICES:-}; do
          f="$BASE/openapi-$s.yaml"
          sz=$(wc -c < "$f" 2>/dev/null || echo 0)
          case "$sz" in ''|*[!0-9]*) sz=0 ;; esac
          if [ "$sz" -lt "$min" ]; then
            if [ "$s" = "engine" ]; then
              generate_stub engine "Crypto Trader Engine API" "No HTTP endpoints yet."
            else
              echo "WARNING: Optional spec missing or small for $s"
            fi
          fi
        done

        exit "$status"

      # 6. Stop services
      - for f in api.pid data.pid engine.pid contact.pid; do [ -f "$f" ] && kill "$(cat "$f")" || true; done

      # 7. Run tests with coverage (parallel, no clean — reuse step 1 artifacts)
      - mvn -B -T 4 -ntp -Pcoverage -DskipITs=true -DfailIfNoTests=false -Djunit.platform.excludeTags=ui verify

      # 8. Generate coverage report
      - |
        export PATH="$PATH:$HOME/.dotnet/tools"
        reportgenerator \
          -reports:"Crypto-Trader-Coverage/target/site/jacoco-aggregate/jacoco.xml" \
          -targetdir:"Crypto-Trader-Docs/docs/coverage" \
          -reporttypes:"Html;HtmlChart;Badges" \
          -sourcedirs:. \
          -classdirectories:"**/target/classes" \
          -assemblymode:MergeByClass
        if [ -f Crypto-Trader-Docs/docs/coverage/index.htm ] && [ ! -f Crypto-Trader-Docs/docs/coverage/index.html ]; then
          cp Crypto-Trader-Docs/docs/coverage/index.htm Crypto-Trader-Docs/docs/coverage/index.html
        fi

      # 9. Build MkDocs site
      - cd Crypto-Trader-Docs && mkdocs build --site-dir site && cd ..

      # 10. Copy OpenAPI specs into built site
      - |
        mkdir -p Crypto-Trader-Docs/site/api
        cp -fv Crypto-Trader-Docs/docs/api/openapi-*.yaml Crypto-Trader-Docs/site/api/
        touch Crypto-Trader-Docs/site/.nojekyll

      # 11. Verify site
      - |
        SITE_DIR="Crypto-Trader-Docs/site"
        if [ -s "$SITE_DIR/index.html" ] && [ "$(find "$SITE_DIR" -type f | wc -l)" -gt 5 ]; then
          echo "Site verified."
        else
          echo "ERROR: Site is missing or empty."
          exit 1
        fi

      # 12. Package and upload to S3
      - |
        cd Crypto-Trader-Docs/site
        tar czf /tmp/site.tar.gz .
        aws s3 cp /tmp/site.tar.gz s3://${ARTIFACT_BUCKET}/${CODEBUILD_RESOLVED_SOURCE_VERSION}/site.tar.gz

  post_build:
    commands:
      - for f in api.pid data.pid engine.pid contact.pid; do [ -f "$f" ] && kill "$(cat "$f")" 2>/dev/null || true; done
      - docker compose -f infra/kafka/docker-compose.yml down -v || true
      - echo "Site artifact uploaded to S3 for GitHub Pages deployment"

cache:
  paths:
    - '/root/.m2/**/*'
    - '**/target/dokka/**/*'
    - '/root/.dotnet/tools/**/*'
