version: 0.2

env:
  secrets-manager:
    GITHUB_TOKEN: ct-docs-secrets:GITHUB_TOKEN
    GH_TOKEN: ct-docs-secrets:GH_TOKEN
  variables:
    MAVEN_OPTS: "-Xms4g -Xmx32g -XX:MetaspaceSize=2g -XX:MaxMetaspaceSize=16g -XX:+UseG1GC"

phases:
  install:
    runtime-versions:
      java: corretto23
    commands:
      - java -version
      - mvn --version

  pre_build:
    commands:
      - echo "=== Maven Publish Check (Dry Run) ==="
      - echo "Commit SHA  - ${CODEBUILD_RESOLVED_SOURCE_VERSION}"
      - echo "Branch/Ref  - ${GITHUB_REF_NAME}"

  build:
    commands:
      # 1. Build all modules (package phase - same as real publish)
      - mvn -B -DskipTests package --file pom.xml

      # 2. Dry-run deploy to a local filesystem repository
      - |
        set -e
        LOCAL_REPO=$(mktemp -d)
        echo "Deploying to local repo: ${LOCAL_REPO}"

        mvn -B -DskipTests \
          -DaltDeploymentRepository=local-check::file://${LOCAL_REPO} \
          deploy --file pom.xml

        echo ""
        echo "=== Dry Run Results ==="
        echo "Artifacts that would be published:"
        find "${LOCAL_REPO}" -type f -name "*.pom" | while read pom; do
          MODULE_DIR=$(basename $(dirname $(dirname $pom)))
          POM_FILE=$(basename $pom)
          echo "  [OK] ${MODULE_DIR}/${POM_FILE}"
        done

        ARTIFACT_COUNT=$(find "${LOCAL_REPO}" -type f -name "*.pom" | wc -l)
        echo ""
        echo "Total artifacts validated: ${ARTIFACT_COUNT}"

      # 3. GAV consistency check - mirrors the real publish's version detection
      - |
        set -e
        echo ""
        echo "=== GAV Consistency Check ==="
        poms=$(find . -name "pom.xml" -not -path "*/target/*" -not -path "*/.aws/*" -not -path "*/node_modules/*")
        gav_errors=0

        for pom in $poms; do
          G=$(mvn -q -DforceStdout -f "$pom" help:evaluate -Dexpression=project.groupId 2>/dev/null || echo "")
          A=$(mvn -q -DforceStdout -f "$pom" help:evaluate -Dexpression=project.artifactId 2>/dev/null || echo "")
          V=$(mvn -q -DforceStdout -f "$pom" help:evaluate -Dexpression=project.version 2>/dev/null || echo "")

          if [ -z "$G" ] || [ -z "$A" ] || [ -z "$V" ]; then
            echo "  [FAIL] INVALID GAV: $pom (G=$G A=$A V=$V)"
            gav_errors=$((gav_errors + 1))
          else
            echo "  [OK] $G:$A:$V"
          fi
        done

        if [ $gav_errors -gt 0 ]; then
          echo "ERROR: $gav_errors module(s) have invalid GAV coordinates."
          exit 1
        fi

        echo ""
        echo "All modules validated successfully."

  post_build:
    commands:
      # Teardown: clean up the local dry-run repo
      - |
        echo "=== Teardown ==="
        if [ -d "${LOCAL_REPO}" ]; then
          rm -rf "${LOCAL_REPO}" && echo "Cleaned local deploy repo." || true
        fi
        echo "Maven publish check complete."

cache:
  paths:
    - '/root/.m2/**/*'
