version: 0.2

env:
  secrets-manager:
    GITHUB_TOKEN: ct-maven-publish-secrets:GITHUB_TOKEN
    GH_TOKEN: ct-maven-publish-secrets:GH_TOKEN
  variables:
    MAVEN_CLI_OPTS: "-B -ntp -T 1C -DskipTests=true -Ddokka.skip=true -Dmaven.javadoc.skip=true"

phases:
  install:
    runtime-versions:
      java: corretto23
    commands:
      - java -version
      - mvn --version

  pre_build:
    commands:
      - echo "=== Maven Publish Check (Dry Run) ==="
      - echo "Commit SHA  - ${CODEBUILD_RESOLVED_SOURCE_VERSION}"
      - echo "Branch/Ref  - ${GITHUB_REF_NAME}"
      - mkdir -p $HOME/.m2
      - aws s3 sync s3://ct-maven-publish-cache/check/m2 $HOME/.m2 --only-show-errors || true

  build:
    commands:
      # 1. Single-reactor verify (parallel, no deploy, no Dokka, no Javadoc)
      - time mvn $MAVEN_CLI_OPTS -Dmaven.deploy.skip=true verify --file pom.xml

      # 2. GAV consistency check (reads from local ~/.m2 -- already populated by install/verify)
      - |
        set -e
        echo ""
        echo "=== GAV Consistency Check ==="
        gav_errors=0
        checked=0
        for pom in $(find $HOME/.m2/repository -type f -name "*.pom" -path "*org/cryptotrader*"); do
          G=$(sed -n '/<parent>/,/<\/parent>/!{ s/.*<groupId>\(.*\)<\/groupId>.*/\1/p }' "$pom" | head -1)
          A=$(sed -n '/<parent>/,/<\/parent>/!{ s/.*<artifactId>\(.*\)<\/artifactId>.*/\1/p }' "$pom" | head -1)
          V=$(sed -n '/<parent>/,/<\/parent>/!{ s/.*<version>\(.*\)<\/version>.*/\1/p }' "$pom" | head -1)
          if [ -z "$G" ]; then
            G=$(sed -n '/<parent>/,/<\/parent>/{ s/.*<groupId>\(.*\)<\/groupId>.*/\1/p }' "$pom" | head -1)
          fi
          if [ -z "$V" ]; then
            V=$(sed -n '/<parent>/,/<\/parent>/{ s/.*<version>\(.*\)<\/version>.*/\1/p }' "$pom" | head -1)
          fi
          if [ -z "$G" ] || [ -z "$A" ] || [ -z "$V" ]; then
            echo "  [FAIL] INVALID GAV: $pom"
            gav_errors=$((gav_errors + 1))
          fi
          checked=$((checked + 1))
        done
        echo "Checked ${checked} POM(s)."
        if [ $gav_errors -gt 0 ]; then
          echo "ERROR: $gav_errors module(s) have invalid GAV coordinates."
          exit 1
        fi
        echo "All modules validated successfully."

  post_build:
    commands:
      - aws s3 sync $HOME/.m2 s3://ct-maven-publish-cache/check/m2 --delete --only-show-errors || true
      - echo "Maven publish check complete."
