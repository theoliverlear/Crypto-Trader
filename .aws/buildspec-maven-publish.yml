version: 0.2

env:
  secrets-manager:
    GITHUB_TOKEN: ct-maven-publish-secrets:GITHUB_TOKEN
    GH_TOKEN: ct-maven-publish-secrets:GH_TOKEN
  variables:
    MAVEN_OPTS: "-Xms8g -Xmx96g -XX:MaxMetaspaceSize=4g -XX:+UseG1GC -XX:+UseStringDeduplication -XX:ActiveProcessorCount=72"
    MAVEN_CLI_OPTS: "-B -ntp -T 1C -DskipTests=true -Ddokka.skip=true -Dmaven.javadoc.skip=true"
    M2_CACHE_S3: "s3://ct-maven-publish-cache/m2"

phases:
  install:
    runtime-versions:
      java: corretto23
    commands:
      - java -version
      - mvn --version
      - nproc

  pre_build:
    commands:
      - echo "=== Restoring ~/.m2 from $M2_CACHE_S3 ==="
      - mkdir -p $HOME/.m2/repository
      - time aws s3 sync "$M2_CACHE_S3" "$HOME/.m2/repository" --only-show-errors || true
      - du -sh $HOME/.m2/repository || true

  build:
    commands:
      - echo "=== Reactor install (parallel, no tests, no Dokka, no Javadoc) ==="
      - time mvn $MAVEN_CLI_OPTS install --file pom.xml

      - echo "=== Reactor deploy to GitHub Packages ==="
      - time mvn $MAVEN_CLI_OPTS -DskipExisting=true deploy --file pom.xml

  post_build:
    commands:
      - echo "=== Saving ~/.m2 to $M2_CACHE_S3 ==="
      - time aws s3 sync "$HOME/.m2/repository" "$M2_CACHE_S3" --delete --only-show-errors || true
      - echo "Maven publish complete."

cache:
  paths:
    - '/root/.m2/**/*'
