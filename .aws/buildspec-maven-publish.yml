version: 0.2

env:
  secrets-manager:
    GITHUB_TOKEN: ct-maven-publish-secrets:GITHUB_TOKEN
    GH_TOKEN: ct-maven-publish-secrets:GH_TOKEN
  variables:
    MAVEN_OPTS: "-Xms8g -Xmx96g -XX:MaxMetaspaceSize=4g -XX:+UseG1GC -XX:+UseStringDeduplication -XX:ActiveProcessorCount=72"
    MAVEN_CLI_OPTS: "-B -ntp -T 1C -DskipTests=true -Ddokka.skip=true -Dmaven.javadoc.skip=true"
    M2_CACHE_S3: "s3://ct-maven-publish-cache/m2"

phases:
  install:
    runtime-versions:
      java: corretto23
    commands:
      - java -version
      - mvn --version
      - nproc

  pre_build:
    commands:
      - echo "=== Restoring ~/.m2 from $M2_CACHE_S3 ==="
      - mkdir -p $HOME/.m2/repository
      - time aws s3 sync "$M2_CACHE_S3" "$HOME/.m2/repository" --only-show-errors || true
      - du -sh $HOME/.m2/repository || true

  build:
    commands:
      - echo "=== Reactor install (parallel, no tests, no Dokka, no Javadoc) ==="
      - time mvn $MAVEN_CLI_OPTS install --file pom.xml

      - |
        echo "=== Parallel GitHub Packages existence check ==="
        set -euo pipefail

        # 1. Enumerate every reactor GAV in ONE Maven call (no per-pom JVM cold starts).
        #    Uses the help:evaluate plugin in batch over the full reactor by walking
        #    the effective POM list emitted by -DforceStdout on the parent.
        mvn -B -ntp -q -DforceStdout -Dexec.executable=bash \
            -Dexec.args='-c "echo ${project.groupId}:${project.artifactId}:${project.version}"' \
            org.codehaus.mojo:exec-maven-plugin:3.1.0:exec --file pom.xml > /tmp/gavs.raw 2>/dev/null || true

        grep -E '^[a-zA-Z0-9_.-]+:[a-zA-Z0-9_.-]+:[0-9].*' /tmp/gavs.raw | sort -u > /tmp/gavs.txt
        echo "  Reactor modules: $(wc -l < /tmp/gavs.txt)"

        if [ ! -s /tmp/gavs.txt ]; then
          echo "  WARNING: GAV enumeration produced no rows; falling back to full reactor deploy."
          echo "FALLBACK" > /tmp/mode.txt
        else
          # 2. HEAD each GAV's .pom in parallel (xargs -P 32). 98 HEADs in ~5s.
          OWNER=$(echo "${GITHUB_REPOSITORY:-Sigwarth-Software/Crypto-Trader}" | cut -d/ -f1)
          export OWNER GITHUB_TOKEN

          check_one() {
            IFS=: read -r G A V <<< "$1"
            GROUP_PATH=$(echo "$G" | tr . /)
            URL="https://maven.pkg.github.com/${OWNER}/${GROUP_PATH}/${A}/${V}/${A}-${V}.pom"
            code=$(curl -L -s -o /dev/null -w "%{http_code}" \
                     --max-time 10 --connect-timeout 5 \
                     -u "x-access-token:${GITHUB_TOKEN}" "$URL" || echo 000)
            if [ "$code" = "200" ]; then echo "EXISTS  $A"; else echo "MISSING $A ($code)"; fi
          }
          export -f check_one

          time xargs -a /tmp/gavs.txt -n 1 -P 32 -I {} bash -c 'check_one "$@"' _ {} > /tmp/check.out
          grep '^EXISTS'  /tmp/check.out | awk '{print $2}' | sort -u > /tmp/skip.txt   || true
          grep '^MISSING' /tmp/check.out | awk '{print $2}' | sort -u > /tmp/deploy.txt || true

          echo "  Already published (skip): $(wc -l < /tmp/skip.txt)"
          echo "  To deploy:                $(wc -l < /tmp/deploy.txt)"
          echo "FILTERED" > /tmp/mode.txt
        fi

      - |
        echo "=== Reactor deploy to GitHub Packages ==="
        set -euo pipefail
        MODE=$(cat /tmp/mode.txt 2>/dev/null || echo FALLBACK)

        if [ "$MODE" = "FILTERED" ]; then
          if [ ! -s /tmp/deploy.txt ]; then
            echo "Nothing new to deploy. All reactor GAVs already exist on GitHub Packages."
            exit 0
          fi
          PL=$(awk '{printf ":%s,", $0}' /tmp/deploy.txt | sed 's/,$//')
          echo "  -pl filter: $PL"
          time mvn $MAVEN_CLI_OPTS -pl "$PL" deploy --file pom.xml
        else
          echo "  Deploying full reactor (existence check unavailable)."
          time mvn $MAVEN_CLI_OPTS deploy --file pom.xml
        fi

  post_build:
    commands:
      - echo "=== Saving ~/.m2 to $M2_CACHE_S3 ==="
      - time aws s3 sync "$HOME/.m2/repository" "$M2_CACHE_S3" --delete --only-show-errors || true
      - echo "Maven publish complete."

cache:
  paths:
    - '/root/.m2/**/*'
