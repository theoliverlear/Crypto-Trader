version: 0.2

env:
  secrets-manager:
    GITHUB_TOKEN: ct-docs-secrets:GITHUB_TOKEN
    GH_TOKEN: ct-docs-secrets:GH_TOKEN
  variables:
    MAVEN_OPTS: "-Xms4g -Xmx32g -XX:MetaspaceSize=2g -XX:MaxMetaspaceSize=16g -XX:+UseG1GC"

phases:
  install:
    runtime-versions:
      java: corretto23
    commands:
      - java -version
      - mvn --version

  build:
    commands:
      # 1. Build all modules (skip tests, skip Dokka - not needed for publishing)
      - mvn -B -T 1C -DskipTests -Ddokka.skip=true package --file pom.xml

      # 2. Deploy each module to GitHub Packages (skip if version already exists)
      - |
        set -e
        REPO="${GITHUB_REPOSITORY:-Sigwarth-Software/Crypto-Trader}"
        echo "=== Maven Publish: Discovering modules ==="
        poms=$(find . -name "pom.xml" -not -path "*/target/*" -not -path "*/.aws/*" -not -path "*/node_modules/*")
        echo "Found $(echo "$poms" | wc -l) pom.xml files"

        deployed=0
        skipped=0
        failed=0

        for pom in $poms; do
          PACK=$(mvn -q -DforceStdout -f "$pom" help:evaluate -Dexpression=project.packaging 2>/dev/null || echo "jar")
          G=$(mvn -q -DforceStdout -f "$pom" help:evaluate -Dexpression=project.groupId 2>/dev/null || echo "")
          A=$(mvn -q -DforceStdout -f "$pom" help:evaluate -Dexpression=project.artifactId 2>/dev/null || echo "")
          V=$(mvn -q -DforceStdout -f "$pom" help:evaluate -Dexpression=project.version 2>/dev/null || echo "")

          if [ -z "$G" ] || [ -z "$A" ] || [ -z "$V" ]; then
            echo "SKIP: Could not resolve GAV for $pom"
            skipped=$((skipped + 1))
            continue
          fi

          GP=${G//./\/}
          URL="https://maven.pkg.github.com/${REPO}/${GP}/${A}/${V}/${A}-${V}.pom"

          echo "--- Checking $A:$V ($PACK) ---"
          code=$(curl -L -s -o /dev/null -w "%{http_code}" \
            -u "x-access-token:${GITHUB_TOKEN}" "$URL")

          if [ "$code" = "200" ]; then
            echo "  Already exists (HTTP 200). Skipping."
            skipped=$((skipped + 1))
            continue
          fi

          log="deploy_${A}_${V}.log"
          echo "  Deploying $A:$V..."

          set +e
          if [ "$PACK" = "pom" ]; then
            mvn -B -T 1C -f pom.xml -pl ":$A" -am -DskipTests=true -Ddokka.skip=true install 2>&1 | tee "$log"
            rc=${PIPESTATUS[0]}
            if [ $rc -eq 0 ]; then
              mvn -B -T 1C -f pom.xml -pl ":$A" -DskipExisting=true -Ddokka.skip=true deploy 2>&1 | tee -a "$log"
              rc=${PIPESTATUS[0]}
            fi
          else
            mvn -B -T 1C -f pom.xml -pl ":$A" -am -DskipTests=true -Ddokka.skip=true install 2>&1 | tee "$log"
            rc=${PIPESTATUS[0]}
            if [ $rc -eq 0 ]; then
              mvn -B -T 1C -f pom.xml -pl ":$A" -DskipTests=true -DskipExisting=true -Ddokka.skip=true deploy 2>&1 | tee -a "$log"
              rc=${PIPESTATUS[0]}
            fi
          fi
          set -e

          if [ $rc -ne 0 ]; then
            if grep -Ei -q "(status code: 409|Return code is: 409|409[^0-9]*Conflict)" "$log"; then
              echo "  409 Conflict - already present. Skipping."
              skipped=$((skipped + 1))
              continue
            else
              echo "  WARNING: Deploy failed for $A:$V (exit $rc)"
              failed=$((failed + 1))
              continue
            fi
          fi

          deployed=$((deployed + 1))
          echo "  Deployed $A:$V successfully."
        done

        echo ""
        echo "=== Maven Publish Summary ==="
        echo "  Deployed: $deployed"
        echo "  Skipped:  $skipped"
        echo "  Failed:   $failed"

        if [ $failed -gt 0 ]; then
          echo "WARNING: $failed module(s) failed to deploy."
          exit 1
        fi

        echo "All modules processed successfully."

  post_build:
    commands:
      - echo "Maven publish complete."

cache:
  paths:
    - '/root/.m2/**/*'
