server:
  port: 8080

spring:
  config:
    import: aws-secretsmanager:/cryptotrader/dev
  application:
    name: crypto-trader-api
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 0s
  thymeleaf:
    cache: false
    check-template-location: false
  freemarker:
    cache: false
  datasource:
    url: ${PSQL_DB_URL}
    username: ${PSQL_USER}
    password: ${PSQL_PW}
    generate-unique-name: false
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: update
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  cloud:
    aws:
      region:
        static: us-east-1
    function:
      sanitization:
        enabled: false
      sanitizing:
        enabled: false
      definition: consoleResponsesConsumer;portfolioSimulationResponsesConsumer
    stream:
      defaultBinder: kafka
      bindings:
        userRegistered-out-0:
          destination: ct.user.registered.v1
          contentType: application/json

        consoleRequests-out-0:
          destination: ct.console.requests
          contentType: application/json

        consoleResponsesConsumer-in-0:
          destination: ct.console.responses
          group: crypto-trader-api-console-responses
          contentType: application/json

        portfolioSimulationRequests-out-0:
          destination: ct.simulator.requests
          contentType: application/json

        portfolioSimulationResponsesConsumer-in-0:
          destination: ct.simulator.responses
          group: crypto-trader-api-simulator-responses
          contentType: application/json

        contactCreated-in-0:
          destination: ct.contact.created.v1
          contentType: application/json
        orderFilled-in-0:
          destination: ct.order.filled.v1
          contentType: application/json

        frontendLogs-out-0:
          destination: ct.logging.frontend.v1
          contentType: application/json

      kafka:
        binder:
          brokers: localhost:9092
          producer-properties:
            linger.ms: 20
            batch.size: 65536
            compression.type: lz4
            acks: 1
          consumer-properties:
            fetch.min.bytes: 1024
            fetch.max.wait.ms: 500
        bindings:
          portfolioSimulationResponsesConsumer-in-0:
            consumer:
              configuration:
                group.instance.id: api-simulator-responder-01
                session.timeout.ms: 30000
                heartbeat.interval.ms: 10000
                max.poll.interval.ms: 900000
          consoleResponsesConsumer-in-0:
            consumer:
              configuration:
                group.instance.id: api-console-responder-01
                session.timeout.ms: 30000
                heartbeat.interval.ms: 10000
                max.poll.interval.ms: 900000
          contactCreated-in-0:
            consumer:
              enableDlq: true
              dlqName: ct.contact.created.v1.DLT
          orderFilled-in-0:
            consumer:
              enableDlq: true
              dlqName: ct.order.filled.v1.DLT

logging:
  level:
    org.springframework: INFO
    org.springframework.web: INFO
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: "http://localhost:8080"
    expiration: 360000
  auth:
    dpop:
      allowed-algs: "ES256"
      replay-ttl-seconds: 120
  honeypot:
    paths: ${SECURITY_HONEYPOT_PATHS:}
  refresh:
    cookie-name: rt
    cookie-samesite: Strict
    cookie-secure: false
    allow-rebind-once: true
cryptotrader:
  api:
    jpa:
      enabled: true
    websocket:
      enabled: true
  load:
    aead: true
  cors:
    allowed-origins: "http://localhost:4200"
    allowed-headers: "authorization,dpop,content-type"