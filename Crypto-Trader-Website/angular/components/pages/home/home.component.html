<!-- home.component.html -->
<ng-container>
    <content-stripe class="intro-stripe">
        <div class="title-text-div">
            <ss-title
                [text]="'Crypto Trader'"
                [tagType]="TagType.H1"
                id="crypto-trader-name-title"
            />
            <!--            <subtitle [text]="'100% of the profit is 100% yours.'" [tagType]="TagType.H4"/>-->
            <subtitle
                [text]="'Right trades, at the right time, every time.'"
                [tagType]="TagType.H5"
            />
        </div>
        <ss-img [imageAsset]="transparentLogo" />
    </content-stripe>
    <div class="intro-text-div">
        <ss-paragraph
            [text]="cryptoTraderDescription"
            class="intro-paragraph"
        />
    </div>
    <tier-promo-stripe />
    <ss-anchor
        [elementLink]="getStartedElementLink"
        [isButton]="true"
        class="home-buttons"
    />
    <transparency-promo />
</ng-container>
