<!-- currencies.component.html -->
<ng-container (error)="onError($event)" (window:scroll)="onScroll()">
    <div
        [@listStagger]="currencies?.currencies?.length || 0"
        class="currency-list"
    >
        @if (currencies?.currencies?.length) {
            @for (
                currency of currencies.currencies;
                track currency.currencyCode
            ) {
                <display-currency [currency]="currency" class="currency-item" />
            }
        }
        <loading-wheel [visible]="isFetching" />
    </div>
</ng-container>
