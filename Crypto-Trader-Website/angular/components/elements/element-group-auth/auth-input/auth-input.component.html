<!-- auth-input.component.html -->
<ng-container>
    <ss-title
        [text]="authTypeString"
        [tagType]="TagType.H5"
        class="auth-input-title"
    />
    <ss-input
        [placeholder]="''"
        [inputType]="getInputType()"
        (inputEvent)="updateInputText($event)"
    />
</ng-container>
