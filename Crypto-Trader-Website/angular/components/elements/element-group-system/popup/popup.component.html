<!-- popup.component.html -->
<ng-container>
    @if (shouldDisplay()) {
        @if (popupMessage) {
            <div class="popup-container">
                <div class="popup-content">
                    <ss-title [tagType]="TagType.H5" [text]="popupMessage.toString()"/>
                </div>
            </div>
        }
    }
</ng-container>
