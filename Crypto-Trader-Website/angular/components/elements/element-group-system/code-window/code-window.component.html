<!-- code-window.component.html -->
<ng-container>
    <div class="window-bar">
        <span class="dot red" aria-hidden="true"></span>
        <span class="dot yellow" aria-hidden="true"></span>
        <span class="dot green" aria-hidden="true"></span>
        <span class="window-title">{{ codeWindow.title }}</span>
    </div>
    <pre class="code-body"><code>{{ codeWindow.code }}</code></pre>
</ng-container>
