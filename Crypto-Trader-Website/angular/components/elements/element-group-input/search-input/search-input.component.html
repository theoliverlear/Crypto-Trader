<!-- search-input.component.html -->
<ng-container>
    <mat-form-field class="search-input-field">
        <div class="input-with-icon">
            <mat-icon>search</mat-icon>
            <input
                [formControl]="searchControl"
                [matAutocomplete]="auto"
                placeholder="Search"
                type="text"
                matInput
            />
            @if (searchControl.value) {
                <button
                    (click)="clear()"
                    mat-icon-button
                    matSuffix
                    aria-label="Clear"
                >
                    <mat-icon>close</mat-icon>
                </button>
            }
        </div>
        <mat-autocomplete #auto="matAutocomplete">
            @if (filteredOptions | async; as options) {
                @for (option of options; track option) {
                    <mat-option
                        [value]="option"
                        (click)="emitSelectionChange()"
                    >
                        {{ option }}
                    </mat-option>
                }
            }
        </mat-autocomplete>
    </mat-form-field>
</ng-container>
