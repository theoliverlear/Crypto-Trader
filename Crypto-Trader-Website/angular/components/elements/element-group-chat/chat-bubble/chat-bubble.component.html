<!-- chat-bubble.component.html -->
<ng-container>
    <div class="chat-bubble" [class.user]="message.role === 'user'"
         [class.assistant]="message.role === 'assistant'">
        <span class="chat-bubble-role">{{ message.role === 'user' ? 'You' : 'AI' }}</span>
        <p class="chat-bubble-content">{{ message.content }}</p>
    </div>
</ng-container>
