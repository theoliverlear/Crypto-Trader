<!-- chat-input.component.html -->
<ng-container>
    <div class="chat-input-wrap">
    <textarea
        class="chat-textarea"
        placeholder="Type a message..."
        [value]="value"
        (input)="onInput($event)"
        (keydown)="onKeyDown($event)"
        rows="1"></textarea>
        <button class="chat-send-button" (click)="onSend()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</ng-container>
