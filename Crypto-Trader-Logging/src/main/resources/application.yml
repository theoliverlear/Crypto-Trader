server:
  port: 8093

spring:
  config:
    import: aws-secretsmanager:/cryptotrader/dev
  application:
    name: crypto-trader-logging
  datasource:
    url: ${PSQL_DB_URL}
    username: ${PSQL_USER}
    password: ${PSQL_PW}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: update
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  cloud:
    aws:
      region:
        static: us-east-1
    function:
      definition: frontendLogsConsumer
    stream:
      enabled: true
      defaultBinder: kafka
      bindings:
        frontendLogsConsumer-in-0:
          destination: ct.logging.frontend.v1
          group: crypto-trader-logging
          contentType: application/json
      kafka:
        binder:
          brokers: localhost:9092
        bindings:
          frontendLogsConsumer-in-0:
            consumer:
              enableDlq: true
              dlqName: ct.logging.frontend.v1.DLT

logging:
  level:
    org.springframework: INFO
